<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="trce logo">
  <!-- Outer hexagon (pointy-top), green stroke -->
  <polygon points="512,128 832,320 832,704 512,896 192,704 192,320"
           fill="none"
           stroke="#00ff88"
           stroke-width="36"
           stroke-linejoin="round"
           stroke-linecap="round"/>

  <!-- TRCE brand mark: three rounded line segments forming stylized T -->
  <!-- Top horizontal (slightly left of center) -->
  <line x1="370" y1="380" x2="600" y2="380"
        stroke="#00ff88"
        stroke-width="36"
        stroke-linecap="round"/>

  <!-- Left vertical (descends from left end of top horizontal) -->
  <line x1="400" y1="380" x2="400" y2="640"
        stroke="#00ff88"
        stroke-width="36"
        stroke-linecap="round"/>

  <!-- Bottom horizontal (offset right of the left vertical) -->
  <line x1="450" y1="640" x2="660" y2="640"
        stroke="#00ff88"
        stroke-width="36"
        stroke-linecap="round"/>
</svg>
