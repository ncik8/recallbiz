<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Edit contact — trce</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0e;
    --surface: #16161e;
    --surface-2: #1e1e28;
    --border: #2a2a35;
    --border-strong: #3a3a48;
    --text: #e8e8ee;
    --text-2: #8a8a95;
    --text-3: #5a5a65;
    --accent: #00ff88;
    --accent-dim: #00cc6f;
    --accent-2: #00d4ff;
    --danger: #ff5555;
    --warning: #ffaa00;
    --success: #00ff88;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  a { color: var(--accent-2); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select {
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 14px;
    border-radius: 6px;
    outline: none;
    width: 100%;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { font-family: inherit; resize: vertical; min-height: 80px; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 6px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
    text-decoration: none;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); color: var(--bg); }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: var(--surface); border-color: var(--border); color: var(--text); }
  .btn-danger-ghost { background: transparent; border-color: transparent; color: var(--danger); padding: 10px 18px; border-radius: 6px; font-size: 14px; font-weight: 500; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
  .btn-danger-ghost:hover { background: rgba(255, 85, 85, 0.1); border-color: rgba(255, 85, 85, 0.3); text-decoration: none; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px;
  }
  .sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    left: 0; top: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
  }
  .sidebar-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 32px;
    padding: 0 8px;
  }
  .sidebar-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 6px;
    color: var(--text-2);
    font-size: 14px;
    margin-bottom: 2px;
  }
  .sidebar-link:hover { background: var(--surface-2); color: var(--text); text-decoration: none; }
  .sidebar-link .icon { font-size: 16px; width: 20px; }
  .main {
    margin-left: 240px;
    padding: 32px 40px;
    min-height: 100vh;
    max-width: 880px;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .topbar h1 {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .form-row label { font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.06em; font-family: 'JetBrains Mono', monospace; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); }
  .saved-flash { background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.3); color: var(--accent); padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
  @media (max-width: 720px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 24px 16px; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">trce</div>
  <nav class="sidebar-nav">
    <a class="sidebar-link" href="/dashboard"><span class="icon">▣</span> Dashboard</a>
    <a class="sidebar-link" href="/dashboard/download.csv"><span class="icon">⇣</span> Download CSV</a>
  </nav>
</aside>
<main class="main">
  <div class="topbar">
    <h1>Edit contact</h1>
    <a class="btn btn-ghost" href="/dashboard">← Back</a>
  </div>

  {% if saved %}
  <div class="saved-flash">Saved.</div>
  {% endif %}

  <div class="card">
    <form action="/dashboard/edit/{{ contact.id }}" method="POST">
      <div class="form-grid">
        <div class="form-row">
          <label>Name</label>
          <input type="text" name="name" value="{{ contact.name or '' }}" required>
        </div>
        <div class="form-row">
          <label>Handle</label>
          <input type="text" name="handle" value="{{ contact.handle or '' }}" placeholder="@username (no @)">
        </div>
        <div class="form-row">
          <label>Company</label>
          <input type="text" name="company" value="{{ contact.company or '' }}">
        </div>
        <div class="form-row">
          <label>Title</label>
          <input type="text" name="title" value="{{ contact.title or '' }}">
        </div>
        <div class="form-row">
          <label>Email</label>
          <input type="email" name="email" value="{{ contact.email or '' }}">
        </div>
        <div class="form-row">
          <label>Phone</label>
          <input type="tel" name="phone" value="{{ contact.phone or '' }}">
        </div>
        <div class="form-row" style="grid-column: 1 / -1;">
          <label>Website</label>
          <input type="url" name="website" value="{{ contact.website or '' }}" placeholder="https://">
        </div>
        <div class="form-row" style="grid-column: 1 / -1;">
          <label>Notes</label>
          <textarea name="notes" rows="6">{{ contact.notes or '' }}</textarea>
        </div>
      </div>
      <div class="form-actions">
        <a class="btn btn-danger-ghost" href="/dashboard/delete/{{ contact.id }}">Delete</a>
        <div style="flex: 1;"></div>
        <a class="btn btn-ghost" href="/dashboard">Cancel</a>
        <button class="btn btn-primary" type="submit">Save changes</button>
      </div>
    </form>
  </div>
</main>
</body>
</html>
